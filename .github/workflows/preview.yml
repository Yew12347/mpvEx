name: Preview Build & Deploy

permissions:
  contents: write
  pages: write
  id-token: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      commit_count: ${{ steps.meta.outputs.commit_count }}
      build_time: ${{ steps.meta.outputs.build_time }}
      universal_size: ${{ steps.meta.outputs.universal_size }}
      arm64-v8a_size: ${{ steps.meta.outputs.arm64-v8a_size }}
      armeabi-v7a_size: ${{ steps.meta.outputs.armeabi-v7a_size }}
      x86_size: ${{ steps.meta.outputs.x86_size }}
      x86_64_size: ${{ steps.meta.outputs.x86_64_size }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build preview APKs
        run: ./gradlew assembleStandardPreview

      - name: Prepare artifacts
        id: meta
        run: |
          set -e

          commit_count=$(git rev-list --count HEAD)
          build_time=$(date -u +"%Y-%m-%d %H:%M UTC")

          echo "commit_count=$commit_count" >> $GITHUB_OUTPUT
          echo "build_time=$build_time" >> $GITHUB_OUTPUT

          mkdir -p output

          apks=(universal arm64-v8a armeabi-v7a x86 x86_64)

          for arch in "${apks[@]}"; do
            src=$(ls app/build/outputs/apk/standard/preview/app-standard-${arch}-preview*.apk)
            dest="output/mpvEx-preview-r${commit_count}-${arch}.apk"

            cp "$src" "$dest"

            size=$(du -h "$dest" | cut -f1)
            echo "${arch}_size=$size" >> $GITHUB_OUTPUT
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: preview-apks
          path: output/

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: preview-apks
          path: ./public

      - name: Generate download page
        run: |
          commit_count=${{ needs.build.outputs.commit_count }}
          build_time="${{ needs.build.outputs.build_time }}"

          cat > ./public/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>mpvEx Preview Builds</title>
            <style>
              body{font-family:sans-serif;background:#0d1117;color:#c9d1d9;padding:2em}
              h1{color:#58a6ff}
              a{color:#58a6ff;text-decoration:none;display:block;margin:8px 0}
              a:hover{text-decoration:underline}
              .note{color:#8b949e;font-size:.9em;margin-top:1em}
            </style>
          </head>
          <body>

          <h1>mpvEx Preview Build r${commit_count}</h1>
          <p>Build time: ${build_time}</p>

          <h3>Downloads</h3>

          <a href="mpvEx-preview-r${commit_count}-universal.apk">
          Universal (${{ needs.build.outputs.universal_size }})
          </a>

          <a href="mpvEx-preview-r${commit_count}-arm64-v8a.apk">
          arm64-v8a (${{ needs.build.outputs.arm64-v8a_size }})
          </a>

          <a href="mpvEx-preview-r${commit_count}-armeabi-v7a.apk">
          armeabi-v7a (${{ needs.build.outputs.armeabi-v7a_size }})
          </a>

          <a href="mpvEx-preview-r${commit_count}-x86.apk">
          x86 (${{ needs.build.outputs.x86_size }})
          </a>

          <a href="mpvEx-preview-r${commit_count}-x86_64.apk">
          x86_64 (${{ needs.build.outputs.x86_64_size }})
          </a>

          <p class="note">Built automatically from the dev branch.</p>

          </body>
          </html>
          EOF

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
